<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>코지 라이프 — Cozy Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=DotGothic16&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ========== 로그인 화면 ========== -->
  <div id="auth-screen" class="screen">
    <div class="auth-bg">
      <div class="auth-cloud c1"></div>
      <div class="auth-cloud c2"></div>
      <div class="auth-cloud c3"></div>
    </div>
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-leaf">🌿</div>
        <h1>코지 라이프</h1>
        <p class="tagline">작은 마을에서의 하루</p>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="login">로그인</button>
        <button class="tab" data-tab="signup">회원가입</button>
      </div>
      <form id="login-form" class="auth-form active">
        <label><span>이메일</span><input type="email" id="login-email" required placeholder="hello@cozy.life" /></label>
        <label><span>비밀번호</span><input type="password" id="login-password" required placeholder="••••••" /></label>
        <button type="submit" class="btn-primary">들어가기</button>
        <p class="form-error" id="login-error"></p>
      </form>
      <form id="signup-form" class="auth-form">
        <label><span>닉네임</span><input type="text" id="signup-nickname" required maxlength="12" placeholder="마을 이름" /></label>
        <label><span>이메일</span><input type="email" id="signup-email" required placeholder="hello@cozy.life" /></label>
        <label><span>비밀번호</span><input type="password" id="signup-password" required minlength="6" placeholder="6자 이상" /></label>
        <button type="submit" class="btn-primary">계정 만들기</button>
        <p class="form-error" id="signup-error"></p>
      </form>
    </div>
  </div>

  <!-- ========== 게임 화면 ========== -->
  <div id="game-screen" class="screen hidden">

    <!-- 맵 (전체 배경) -->
    <div class="map-container">
      <svg id="tilemap" viewBox="0 0 560 360" preserveAspectRatio="xMidYMid meet" aria-label="월드 맵"></svg>
    </div>

    <!-- HUD 오버레이 (좌상단) -->
    <div class="hud">
      <div class="hud-profile">
        <div class="hud-avatar">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="4" fill="currentColor"/><path d="M4 22c0-5 4-8 8-8s8 3 8 8" fill="currentColor"/></svg>
        </div>
        <span class="hud-name" id="hud-nickname">—</span>
      </div>
      <div class="hud-bars">
        <div class="hud-bar-row">
          <svg class="hud-bar-icon" viewBox="0 0 24 24"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.5-7 10-7 10z" fill="currentColor"/></svg>
          <div class="hud-bar"><div class="hud-bar-fill health" id="bar-health"></div></div>
          <span class="hud-bar-num" id="num-health">100</span>
        </div>
        <div class="hud-bar-row">
          <svg class="hud-bar-icon hunger-icon" viewBox="0 0 24 24"><path d="M6 4h12l-1 16H7z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/></svg>
          <div class="hud-bar"><div class="hud-bar-fill hunger" id="bar-hunger"></div></div>
          <span class="hud-bar-num" id="num-hunger">100</span>
        </div>
      </div>
      <div class="hud-money">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="currentColor" opacity="0.2"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><text x="12" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="currentColor">G</text></svg>
        <span id="num-money">0</span>
      </div>
    </div>

    <!-- 우상단 버튼들 -->
    <div class="hud-top-right">
      <button class="game-btn small" id="btn-logout" title="로그아웃">
        <svg viewBox="0 0 24 24"><path d="M10 4H5v16h5M15 8l4 4-4 4M19 12H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- 장소 정보 + 액션 (하단) -->
    <div class="bottom-bar">
      <div class="location-info">
        <h2 id="world-title">마을 광장</h2>
        <p id="world-desc">사람들이 오가는 작은 광장이에요.</p>
      </div>
      <div class="action-row" id="location-cards"></div>
    </div>

    <!-- 하단 네비게이션 (인벤토리/채팅 토글) -->
    <div class="bottom-nav">
      <button class="nav-btn" id="btn-inventory" data-panel="inventory">
        <svg viewBox="0 0 24 24"><path d="M4 8h16v12H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M8 8V5a4 4 0 0 1 8 0v3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>가방</span>
      </button>
      <button class="nav-btn" id="btn-chat" data-panel="chat">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v12H8l-4 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        <span>채팅</span>
        <span class="online-dot" id="online-dot"></span>
      </button>
    </div>

    <!-- 인벤토리 패널 (슬라이드업) -->
    <div class="slide-panel hidden" id="panel-inventory">
      <div class="panel-header">
        <h3>가방</h3>
        <button class="panel-close" data-close="inventory">✕</button>
      </div>
      <div class="inventory-grid" id="inventory-grid"></div>
      <p class="hint" id="inventory-hint">아이템을 탭해서 확인하세요</p>
    </div>

    <!-- 채팅 패널 (슬라이드업) -->
    <div class="slide-panel hidden" id="panel-chat">
      <div class="panel-header">
        <h3>마을 채팅</h3>
        <button class="panel-close" data-close="chat">✕</button>
      </div>
      <div class="chat-log" id="chat-log"></div>
      <form class="chat-form" id="chat-form">
        <input type="text" id="chat-input" placeholder="메시지 입력…" maxlength="200" autocomplete="off" />
        <button type="submit" class="btn-send" aria-label="전송">
          <svg viewBox="0 0 24 24"><path d="M4 12l16-8-6 16-2-7z" fill="currentColor"/></svg>
        </button>
      </form>
    </div>

    <!-- 상점 모달 -->
    <div id="shop-modal" class="modal-overlay hidden">
      <div class="shop-card">
        <div class="shop-header">
          <h2>잡화 상점</h2>
          <span class="shop-money-display">💰 <span id="shop-money">0 G</span></span>
          <button class="panel-close" id="shop-close">✕</button>
        </div>
        <div class="shop-mode-tabs">
          <button class="shop-mode-tab active" data-mode="buy">구매하기</button>
          <button class="shop-mode-tab" data-mode="sell">판매하기</button>
        </div>
        <div class="shop-body" id="shop-items"></div>
      </div>
    </div>

    <!-- 토스트 -->
    <div id="toast-container"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
